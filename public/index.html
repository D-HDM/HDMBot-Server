<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDM BOT - Session Manager</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e);min-height:100vh;color:#fff;padding:20px}
        .container{max-width:800px;margin:0 auto}
        .header{text-align:center;padding:30px 0 20px}
        .header h1{font-size:2em;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header p{color:#888;margin-top:5px}
        
        .stats-bar{display:flex;gap:15px;justify-content:center;margin-bottom:25px;flex-wrap:wrap}
        .stat{background:#1e1e3a;border-radius:12px;padding:15px 25px;text-align:center;border:1px solid #2a2a4a;min-width:100px}
        .stat .num{font-size:1.5em;font-weight:bold;color:#667eea}
        .stat .label{font-size:0.75em;color:#888;text-transform:uppercase}

        .add-btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:14px;border:none;border-radius:12px;cursor:pointer;font-size:1em;margin-bottom:20px;width:100%;font-weight:600;transition:all 0.3s}
        .add-btn:hover{opacity:0.9;transform:translateY(-1px)}

        .form-card{display:none;background:#1e1e3a;padding:25px;border-radius:15px;margin-bottom:20px;border:1px solid #2a2a4a}
        .form-card.active{display:block}
        .form-card h3{color:#667eea;margin-bottom:15px}
        .form-card input{width:100%;padding:12px;border-radius:8px;border:1px solid #2a2a4a;background:#12122a;color:#fff;margin:8px 0;font-size:0.95em}
        .form-card input:focus{outline:none;border-color:#667eea}
        .form-actions{display:flex;gap:10px;margin-top:15px}
        .form-actions button{flex:1;padding:12px;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.95em;transition:all 0.2s}
        .form-actions button:hover{opacity:0.85}

        .session-card{background:#1e1e3a;border-radius:15px;padding:20px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;border:1px solid #2a2a4a;gap:15px;flex-wrap:wrap}
        .session-card:hover{border-color:#667eea55}
        .session-info{flex:1;min-width:180px}
        .session-info h3{color:#e0e0ff;margin-bottom:4px;font-size:1.1em;word-break:break-all}
        .session-info .sid{color:#666;font-size:0.8em;margin-bottom:6px}
        
        .status-badge{display:inline-block;font-size:0.75em;padding:4px 10px;border-radius:10px;font-weight:600}
        .s-connected{background:#28a74522;color:#28a745;border:1px solid #28a74544}
        .s-disconnected{background:#dc354522;color:#dc3545;border:1px solid #dc354544}
        .s-connecting{background:#ffc10722;color:#ffc107;border:1px solid #ffc10744}
        .s-inactive{background:#6c757d22;color:#6c757d;border:1px solid #6c757d44}

        .actions{display:flex;gap:8px;flex-wrap:wrap}
        .btn{padding:8px 14px;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.85em;transition:all 0.2s;white-space:nowrap}
        .btn:hover{opacity:0.85;transform:translateY(-1px)}
        .btn-connect{background:#667eea;color:#fff}
        .btn-disconnect{background:#f0ad4e;color:#000}
        .btn-qr{background:#6f42c1;color:#fff}
        .btn-delete{background:#dc3545;color:#fff}
        .btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}

        .qr-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);justify-content:center;align-items:center;z-index:9999}
        .qr-overlay.active{display:flex}
        .qr-box{background:#1e1e3a;padding:30px;border-radius:20px;text-align:center;max-width:420px;width:90%;border:1px solid #2a2a4a}
        .qr-box h3{color:#667eea;margin-bottom:10px}
        .qr-box img{max-width:250px;border-radius:12px;margin:15px 0}
        .qr-box p{color:#999;margin:8px 0;font-size:0.9em}
        .qr-box .btn{margin-top:10px}
        
        .empty-state{text-align:center;padding:60px 20px;color:#555}
        .empty-state .icon{font-size:3em;margin-bottom:15px}
        .empty-state p{font-size:1.1em}
        
        .loading{text-align:center;padding:40px;color:#666}
        .spinner{display:inline-block;width:30px;height:30px;border:3px solid #2a2a4a;border-top-color:#667eea;border-radius:50%;animation:spin 0.8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        .toast{position:fixed;bottom:20px;right:20px;background:#1e1e3a;color:#fff;padding:12px 20px;border-radius:10px;border:1px solid #2a2a4a;z-index:9999;animation:slideIn 0.3s ease;max-width:350px}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
        .toast.error{border-color:#dc3545;color:#dc3545}
        .toast.success{border-color:#28a745;color:#28a745}

        @media(max-width:500px){
            .container{padding:10px}
            .session-card{flex-direction:column;align-items:stretch}
            .actions{justify-content:center}
            .stats-bar{gap:8px}
            .stat{padding:10px 15px;min-width:80px}
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 HDM BOT</h1>
            <p>Multi-Session Manager</p>
        </div>

        <div class="stats-bar" id="statsBar"></div>

        <button class="add-btn" onclick="toggleForm()">+ Add New Session</button>

        <div class="form-card" id="createForm">
            <h3>Create New Session</h3>
            <input type="text" id="newId" placeholder="Session ID * (letters, numbers, hyphens)">
            <input type="text" id="newName" placeholder="Display Name (optional)">
            <input type="text" id="newPhone" placeholder="Phone Number (optional)">
            <div class="form-actions">
                <button style="background:#667eea;color:#fff" onclick="createSession()">Create</button>
                <button style="background:#dc3545;color:#fff" onclick="toggleForm()">Cancel</button>
            </div>
        </div>

        <div id="sessionsList"><div class="loading"><div class="spinner"></div><p style="margin-top:15px">Loading sessions...</p></div></div>
    </div>

    <div class="qr-overlay" id="qrOverlay">
        <div class="qr-box">
            <h3>📱 Scan QR Code</h3>
            <img id="qrImage" src="" alt="QR Code">
            <p>WhatsApp → Settings → Linked Devices → Link a Device</p>
            <p id="qrStatus" style="color:#ffc107">Waiting for QR...</p>
            <button class="btn btn-delete" onclick="closeQR()">Close</button>
        </div>
    </div>

    <script>
        const API = '/api/sessions';
        let qrTimer = null;
        let currentQR = null;

        // ==================== TOAST ====================
        function toast(msg, type = '') {
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.textContent = msg;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        // ==================== LOAD SESSIONS ====================
        async function loadSessions() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                const list = document.getElementById('sessionsList');
                const stats = document.getElementById('statsBar');

                if (!data.success) {
                    list.innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>Failed to load</p></div>';
                    return;
                }

                const sessions = data.sessions || [];
                
                // Stats
                const connected = sessions.filter(s => s.status === 'connected').length;
                const total = sessions.length;
                stats.innerHTML = `
                    <div class="stat"><div class="num">${total}</div><div class="label">Total</div></div>
                    <div class="stat"><div class="num" style="color:#28a745">${connected}</div><div class="label">Online</div></div>
                    <div class="stat"><div class="num" style="color:#dc3545">${total - connected}</div><div class="label">Offline</div></div>
                `;

                if (sessions.length === 0) {
                    list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>No sessions yet</p><p style="font-size:0.9em;color:#666">Click "Add New Session" to get started</p></div>';
                    return;
                }

                list.innerHTML = sessions.map(s => {
                    const cls = s.status === 'connected' ? 's-connected' :
                               s.status === 'connecting' ? 's-connecting' : 's-inactive';
                    const isConnected = s.status === 'connected';
                    const name = escapeHtml(s.botName || s.id);
                    const phone = escapeHtml(s.phoneNumber || 'N/A');

                    return `
                    <div class="session-card">
                        <div class="session-info">
                            <h3>${name}</h3>
                            <div class="sid">${escapeHtml(s.id)} | 📱 ${phone}</div>
                            <span class="status-badge ${cls}">${s.status}</span>
                        </div>
                        <div class="actions">
                            ${isConnected 
                                ? `<button class="btn btn-disconnect" onclick="disconnectSession('${escapeHtml(s.id)}')">❌ Disconnect</button>`
                                : `<button class="btn btn-connect" onclick="connectSession('${escapeHtml(s.id)}')">🔌 Connect</button>`
                            }
                            <button class="btn btn-qr" onclick="showQR('${escapeHtml(s.id)}')">📱 QR</button>
                            <button class="btn btn-delete" onclick="deleteSession('${escapeHtml(s.id)}')">🗑️</button>
                        </div>
                    </div>`;
                }).join('');
            } catch (err) {
                document.getElementById('sessionsList').innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>Connection error</p></div>';
            }
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        // ==================== FORM ====================
        function toggleForm() {
            const form = document.getElementById('createForm');
            form.classList.toggle('active');
            if (form.classList.contains('active')) {
                document.getElementById('newId').value = '';
                document.getElementById('newName').value = '';
                document.getElementById('newPhone').value = '';
                document.getElementById('newId').focus();
            }
        }

        async function createSession() {
            const sessionId = document.getElementById('newId').value.trim();
            const botName = document.getElementById('newName').value.trim();
            const ownerNumber = document.getElementById('newPhone').value.trim();

            if (!sessionId) return toast('Session ID is required', 'error');

            try {
                const res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId, botName, ownerNumber })
                });
                const data = await res.json();

                if (data.success) {
                    toggleForm();
                    toast('Session created!', 'success');
                    loadSessions();
                } else {
                    toast(data.error || 'Failed', 'error');
                }
            } catch (err) {
                toast('Failed to create session', 'error');
            }
        }

        // ==================== ACTIONS ====================
        async function connectSession(id) {
            try {
                const res = await fetch(`${API}/${id}/connect`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    if (data.needQr) showQR(id);
                    toast(data.message || 'Connecting...', 'success');
                    setTimeout(loadSessions, 2000);
                }
            } catch (err) {
                toast('Connection failed', 'error');
            }
        }

        async function disconnectSession(id) {
            if (!confirm(`Disconnect "${id}"?`)) return;
            try {
                await fetch(`${API}/${id}/disconnect`, { method: 'POST' });
                toast('Disconnected', 'success');
                loadSessions();
            } catch (err) {
                toast('Failed to disconnect', 'error');
            }
        }

        async function deleteSession(id) {
            if (!confirm(`Delete "${id}" permanently?`)) return;
            try {
                await fetch(`${API}/${id}`, { method: 'DELETE' });
                toast('Deleted', 'success');
                loadSessions();
            } catch (err) {
                toast('Failed to delete', 'error');
            }
        }

        // ==================== QR ====================
        function showQR(id) {
            currentQR = id;
            document.getElementById('qrOverlay').classList.add('active');
            document.getElementById('qrImage').src = '';
            document.getElementById('qrStatus').textContent = 'Loading QR...';
            document.getElementById('qrStatus').style.color = '#ffc107';
            
            pollQR();
            if (qrTimer) clearInterval(qrTimer);
            qrTimer = setInterval(pollQR, 2000);
        }

        async function pollQR() {
            if (!currentQR) return;
            try {
                const res = await fetch(`${API}/${currentQR}/status`);
                const data = await res.json();

                if (data.connected) {
                    document.getElementById('qrStatus').textContent = '✅ Connected!';
                    document.getElementById('qrStatus').style.color = '#28a745';
                    setTimeout(closeQR, 1500);
                    loadSessions();
                } else if (data.qr) {
                    document.getElementById('qrImage').src = data.qr;
                    document.getElementById('qrStatus').textContent = data.qrScanned ? '📱 Scanned! Confirming...' : '📱 Scan with WhatsApp';
                    document.getElementById('qrStatus').style.color = data.qrScanned ? '#ffc107' : '#fff';
                }
            } catch (err) {
                console.error('QR poll:', err);
            }
        }

        function closeQR() {
            document.getElementById('qrOverlay').classList.remove('active');
            if (qrTimer) { clearInterval(qrTimer); qrTimer = null; }
            currentQR = null;
            loadSessions();
        }

        // ==================== INIT ====================
        loadSessions();
        setInterval(loadSessions, 10000);

        // Close form on Escape
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                document.getElementById('createForm').classList.remove('active');
                closeQR();
            }
        });
    </script>
</body>
</html>
